name: Synthetic Prod Checks

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  synthetic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run synthetic URL checks
        shell: pwsh
        run: |
          ./backend/scripts/synthetic-prod.ps1 `
            -WebUrl "https://www.boyzweekend.org" `
            -AdminUrl "https://www.boyzweekend.org/admin" `
            -ApiHealthUrl "https://api.boyzweekend.org/api/health"
