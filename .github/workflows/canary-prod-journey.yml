name: Canary Prod Journey

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  canary_journey:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate production canary secret
        shell: bash
        env:
          PROD_ADMIN_PASSWORD: ${{ secrets.PROD_ADMIN_PASSWORD }}
        run: |
          if [ -z "$PROD_ADMIN_PASSWORD" ]; then
            echo "Missing required secret: PROD_ADMIN_PASSWORD"
            exit 1
          fi

      - name: Run production canary user journey
        shell: pwsh
        env:
          PROD_ADMIN_PASSWORD: ${{ secrets.PROD_ADMIN_PASSWORD }}
        run: |
          ./backend/scripts/journey-prod.ps1 `
            -BaseUrl "https://api.boyzweekend.org/api" `
            -WebUrl "https://www.boyzweekend.org" `
            -AdminSecret "$env:PROD_ADMIN_PASSWORD" `
            -CanaryTeamId "spades"

      - name: Open or update GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[monitor] Canary Prod Journey failing';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The hourly production canary journey workflow failed.',
              '',
              `- Workflow: ${context.workflow}`,
              `- Run: ${runUrl}`,
              `- Ref: ${context.ref}`,
              `- Commit: ${context.sha}`,
              `- Actor: ${context.actor}`,
              `- Trigger: ${context.eventName}`,
              `- Detected at: ${new Date().toISOString()}`
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }

      - name: Close monitor issue on recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[monitor] Canary Prod Journey failing';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = issues.find((issue) => issue.title === title);
            if (!existing) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: `Canary Prod Journey recovered successfully. Closing via ${runUrl} at ${new Date().toISOString()}.`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed'
            });
